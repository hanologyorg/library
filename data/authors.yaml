C001:
  name: 王弼
  dynasty: 魏
  bio: 王弼（226—249），字輔嗣，山陽高平（今山東鄒城）人。魏晉玄學的代表人物，著有《老子道德經注》、《周易注》等。
C002:
  name: 河上公
  dynasty: 漢
  bio: 河上公，西漢隱士，相傳作《老子河上公章句》，以治國養生之旨注解《老子》。
C003:
  name: 李世民
  dynasty: 唐
  bio: 唐太宗李世民（598—649），唐朝第二位皇帝，貞觀之治的開創者。著有《帝範》以教導太子。
C004:
  name: 武曌
  dynasty: 唐
  bio: 武則天（624—705），名曌，并州文水（今山西文水）人。中國歷史上唯一的女皇帝，著有《臣軌》。
C010:
  name: 佚名
  dynasty: 未知
C011:
  name: 紀昀
  dynasty: 清
  bio: 紀昀（1724—1805），字曉嵐，直隸獻縣（今河北滄州）人。清代著名學者，官至禮部尚書，《四庫全書》總纂官。
C012:
  name: 陸錫熊
  dynasty: 清
  bio: 陸錫熊（1735—1790），字耳山，江蘇婁縣人。《四庫全書》總纂官。
C013:
  name: 孫士毅
  dynasty: 清
  bio: 孫士毅（1720—1796），字智冶，一字補山，浙江仁和人。《四庫全書》總纂官。
C014:
  name: 陸費墀
  dynasty: 清
  bio: 陸費墀（1731—1790），字頤淳，浙江桐鄉人。《四庫全書》總校官。
