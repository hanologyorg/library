A001:
  name: 項羽
  dynasty: 秦末
  bio: |-
    項羽（公元前232—202），名籍，字羽，下相（今江蘇省宿遷縣西）人，
    祖先是戰國時楚國的貴族。秦末群雄並起，項羽率兵起義，屢破秦軍。秦滅
    亡後，項羽自立為西楚霸王。他和另一支起義隊伍的領袖漢王劉邦爭天下。
    楚、漢兩軍相爭五年，最初漢軍屢為楚軍所敗，後來卻反敗為勝。最後一戰，
    楚軍被圍於垓下（今安徽省靈璧縣東南），兵少糧盡，楚軍瓦解，項羽逃至
    烏江（今安徽省和縣東北）自殺。
A002:
  name: 漢樂府
  dynasty: 漢
  bio: |-
    樂府歌謠產生於漢代，其來源是仿效周代的行人之官，到各個諸侯國收
    集民間詩歌，以便知道民間疾苦。「樂府」這一個官方機構，在漢武帝時設
    置。何以稱之為「府」？「府」本來是大將軍的辦事處，收集民間歌謠的辦
    事處也稱為「府」，「樂府」在當時被看重的情況可想而知。樂府將採集自民
    間的歌謠，製成樂章，在宮中唱誦，一方面讓在上位者了解民情，同時可作
    為宮廷的娛樂。後來人們把「樂府」所整理的歌辭叫「樂府詩」或簡稱
A003:
  name: 《古詩十九首》
  dynasty: 漢
A004:
  name: 曹操
  dynasty: 漢末
  bio: |-
    曹操（公元155—220），字孟德，東漢沛國譙郡（今安徽省亳縣）人。
    東漢末年，黃巾作亂，他起兵鎮壓，迎漢獻帝遷都許昌，受封為大將軍及丞
    相，從此挾天子以令諸侯，成為北方實際的統治者。他用人強調「唯才是舉」，
    打破家世門第的限制。在他周圍集中了許多人才，其中包括不少文學之士。
    他自己雅愛詩章，作品深受樂府詩的影響，但往往能別出新意，用樂府舊題，
    抒寫個人政治懷抱，風格慷慨悲涼，反映着那個時代的面貌
A005:
  name: 曹植
  dynasty: 漢末
  bio: |-
    曹植（公元192—232），字子建，魏武帝曹操第三子，魏文帝曹丕之弟。
    少年聰穎異常，工於詩文，深得曹操寵愛，被譽為「才高八斗」；但由於恃
    才傲物，任性而為，後來漸漸失寵。他與曹丕爭奪世子位失敗後，在文帝和
    明帝（曹丕長子曹叡）兩朝都得不到重用，最後抑鬱而死，年僅四十一歲。
    曹植的詩，無論古詩和樂府，都很有成就。他流傳後世的詩約八十首，抒情、
    說理、寫景、贈答各種題材俱備，並以五言為主，大都詞采華
A006:
  name: 陶淵明
  dynasty: 東晉
  bio: |-
    陶潛（公元365—427），字淵明；一說名淵明，字元亮，東晉末、
    南朝宋初潯陽柴桑（今江西省九江市）人。他的宅邊種有五棵柳樹，故號
    五柳先生。他的祖父和父親都做過官，但後來家道中落，所以他在少年時
    代生活已很貧困。陶淵明為了養活家人，曾經到處求職，也做過幾次小官，
    但每次時間都很短。最後一次出任彭澤令，做了八十多天就辭官了。辭官
    的理由，據蕭統在《陶淵明傳》中的敘述，因為有高級官員到來視察，要
    他
A007:
  name: 北朝民歌
  dynasty: 南北朝
  bio: |-
    樂府歌謠產生於漢代，其來源是仿效周代的行人之官，到各個諸侯國
    收集民間詩歌，以便知道民間疾苦。「樂府」這一個官方機構，在漢武帝
    時設置。何以稱之為「府」？「府」本來是大將軍的辦事處，收集民間歌
    謠的辦事處也稱為「府」，「樂府」在當時被看重的情況可想而知。樂府負
    責採集民間的歌謠，製成樂章，讓皇帝和大臣了解民情，同時作為宮庭的
    娛樂。後來人們把「樂府」所整理的歌辭稱為「樂府詩」或簡稱「樂府」。
    樂府
A008:
  name: 虞世南
  dynasty: 唐
  bio: |-
    虞世南（公元558—638），越州（今浙江省餘姚縣）人，由隋入唐，兩
    朝均仕宦顯達。他精通書法，親承王羲之七代孫僧智永傳授，繼承了二王（王
    羲之、王獻之）的書法傳統。他的詩歌，襲齊梁詩風，追求辭藻與格律，不
    少是點綴花草，精巧細密之詞。其中還有一些是奉皇帝之命所作、所和的應
    制詩，內容多為歌功頌德，是當時宮廷文學的領袖。
    二、注釋
    1.的歷：明亮、鮮明的樣子。
    歷：○粵[力]，[lik6]；○漢[
A009:
  name: 駱賓王
  dynasty: 唐
  bio: |-
    駱賓王（公元640？—684？），唐朝婺州義烏（今浙江省義烏縣）人。
    早年曾任一些小官，不久因上書議論政事，觸怒了武則天，被捕下獄。後徐
    敬業舉兵反對武則天，駱賓王代他作討武氏檄文，力陳她的罪狀。徐敬業事
    敗後，駱賓王不知所終。他是唐朝初期傑出的詩人，與王勃、楊炯、盧照鄰
    並稱「初唐四傑」，擅長七言，五言也不乏佳作。他的詩多悲憤之詞，音調
    雄渾，氣魄悲壯。
A010:
  name: 王勃
  dynasty: 唐
  bio: |-
    王勃（公元650—676），字子安，絳州龍門（今山西省河津市）人。少
    有「神童」之稱，博學多才。十四歲應舉及第，授朝散郎，做過幾任小官。
    後獲罪革職，他的父親受連累，被貶南方邊遠之地。王勃渡海探親，溺水受
    驚而死。王勃既能寫詩又會作文，與同時的楊炯、盧照鄰、駱賓王齊名，後
    人稱他們為「初唐四傑」。四傑之中，王勃才氣最高，成就最大，是四傑之
    冠。
A011:
  name: 賀知章
  dynasty: 唐
  bio: |-
    賀知章（公元659—744？），字季真，晚年自號四明狂客，唐代越州永
    興（今浙江省蕭山縣）人。從武則天證聖元年（公元695）開始步入仕途，
    此後長期在京任官。賀知章善寫詩和書法，在當時的文壇很有地位。天寶初
    年，他在長安和李白見面，二人一見如故，賀知章呼李白為「謫仙子」（謫
    仙：稱譽才學優異的人，猶如謫降人世的神仙），對李白的詩作大加讚賞，
    使李白的詩名更加名震京師。天寶三年（公元744）賀知章告
A012:
  name: 張若虛
  dynasty: 唐
  bio: |-
    張若虛（生卒年不詳），唐朝揚州人，生平事跡不詳，只知他的文詞在當時與賀
    知章等人齊名，名滿京城。現存詩作只有兩首。
    二、注釋
    1.春江花月夜：原是樂府舊題，相傳為南朝後主陳叔寶所創。張若虛這首
    詩只是用了這個題目來創作，已非原有曲調。
    2.共潮生：隨着潮水的上漲，也同時升起。
    3.灩灩：○粵[驗]，[jim6]；○漢[yɑ̀n]。波光閃動的樣子。
    4.宛轉：曲折。亦作「婉轉」。
    5.遶：○粵[擾]
A013:
  name: 王翰
  dynasty: 唐
  bio: |-
    王翰（生卒年不詳），字子羽，并州晉陽（今山西省太原市）人。他青
    年時豪放不羈，喜飲酒遊樂；後於唐睿宗景雲元年（公元710）登進士第。
    張說任宰相時，應召入朝任職；張說罷相後，被貶到地方上去，最後任通州
    司馬，在任期間逝世。他的詩以七絕見長，善寫邊塞詩，詩中多壯麗之詞。
    二、注釋
    1.涼州詞：又稱《涼州曲》，唐代樂府曲名，是歌唱涼州一帶邊塞生活的
    歌曲。涼州，在今甘肅、寧夏一帶，因那裏氣溫低而得名。
A014:
  name: 王之渙
  dynasty: 唐
  bio: |-
    王之渙（公元688—742），字季凌，唐代晉陽（今山西省太原市）人。
    他曾為官，但被人誣陷，革去官位，於是過了十五年的漫遊生活，蹤跡遍佈
    黃河南北。他的詩在當時非常流行，常被當時的樂工譜成歌曲演唱，可惜他
    只有六首詩歌流傳後世。他的詩以描寫邊疆風光著稱，意境開闊，感情奔放。
A015:
  name: 孟浩然
  dynasty: 唐
  bio: |-
    孟浩然（公元689—740），襄州襄陽（今湖北襄陽市）人。唐代山水田
    園詩派代表作家之一。年青的時候在家鄉鹿門山隱居讀書，到了四十多歲，
    才到京城長安應考進士，想求得一官半職，一展政治抱負，可惜願望未能實
    現，但和王維、李白、王昌齡等結成了詩友。孟浩然失意於功名，便到了江
    南一帶名山大川漫遊，然後再回故鄉隱居，所以他的詩，大多以漫遊中的景
    物風光及歸隱時的山水田園生活為題材。他在當時已很有詩名，李
A016:
  name: 王維
  dynasty: 唐
  bio: |-
    王維（公元701—761），字摩詰，祖籍太原祁州（今山西省祁縣），從
    他父親開始，後遷居到蒲州（今山西省永濟縣）。唐玄宗開元九年（公元721）
    進士，早年在政治上有進取心。其後遇上安史之亂，安祿山攻下長安，王維
    被迫在他手下作官。亂平之後，王維被問罪降職，此後他不再熱衷仕途，天
    寶年間在終南山和輞川（今陝西省藍田縣南）隱居，一邊在朝做官，一邊求
    隱皈佛，摩詰正是佛經中一位居士的名字，晚年過着恬靜閒
A017:
  name: 王昌齡
  dynasty: 唐
  bio: |-
    王昌齡（公元694？—756？），字少伯，京兆長安（今陝西省西安市）
    人。唐朝開元十五年（公元727）登進士第，曾任江寧丞、龍標尉等官職，
    故世稱「王江寧」或「王龍標」。在開元、天寶年間，以詩名重一時，有「詩
    家天子」的美譽。安史之亂時被濠州刺史史閭丘所殺。他擅長寫七言絕句，
    題材包括邊塞、宮怨、閨怨、送別等，意境清新，構思細密，當中以寫邊塞
    為主題的詩歌最有名。
    二、注釋
    1.閨：指女子的臥室。
A018:
  name: 李白
  dynasty: 唐
  bio: |-
    李白（公元701—762），字太白，號青蓮居士。唐代詩人。自稱祖籍隴
    西成紀（今甘肅省秦安縣），先世在隋代末年流徙西域。李白出生地有長安、
    蜀中及西域等多種不同的說法。李白年青時隨父遷徙入蜀，居於綿州青蓮鄉
    （今四川省青蓮鎮）。年二十餘辭親遠遊，沿三峽路線出川，漫遊各地，求
    仙學道，嗜酒任俠。年逾三十至長安求仕，其後失意東歸。天寶年間奉詔入
    京，玄宗命待詔翰林，在位一年多即請辭，玄宗賜金放還。安史
A019:
  name: 崔顥
  dynasty: 唐
  bio: |-
    崔顥（公元705─754），汴州（今河南省開封市）人。唐開元年間進
    士，當過一些官職。他在唐代詩名已很大，但事跡流傳甚少。早期的詩多
    寫婦女生活，也不乏譏諷權貴之作，俱富於樂府民歌的本色。後來他漫遊
    各地，從軍出塞，詩歌題材轉以邊塞風光及戰爭為主，風格亦變得雄渾奔
    放。
A020:
  name: 杜甫
  dynasty: 唐
  bio: |-
    杜甫（公元712—770），字子美，祖籍襄陽（今湖北省襄陽巿），後遷
    居河南鞏縣（今河南省鞏義巿）。杜甫出身於書香世代的家庭，他的祖父是
    初唐名詩人杜審言。年輕的時候，他曾經漫遊吳、越一帶（今江蘇省、浙江
    省）。二十四歲赴洛陽參加科舉考試落第，到齊、趙（今山東省、河北省）
    等地漫遊。三十四歲的時候，他到了長安，在這裏住了近十年。天寶十四年，
    安祿山攻陷長安，杜甫逃至鳳翔，謁見肅宗，得了一個左拾遺的
A021:
  name: 張繼
  dynasty: 唐
  bio: |-
    張繼（生卒年不詳），字懿孫，襄州（今湖北省襄陽縣）人。唐天寶十
    二年（公元753）考中進士，做過一些小官。他的詩風清迥，詩歌語言樸素
    自然，內容多反映社會現實。他流傳下來的詩只有四十餘首，其中還攙雜了
    他人的作品。
A022:
  name: 司空曙
  dynasty: 唐
  bio: |-
    司空曙（公元？—790），字文明，唐代廣平人（今河北省雞澤縣）人。安史
    亂起，往江南避亂；大曆年間舉進士，為人磊落高潔，因不媚權貴，遭到貶謫。
    他的詩多寫自然景色和身世羈旅、悲歡離合等，是中唐時代有名的「大曆十才子」
    之一。
    二、注釋
    1.江村：臨江的村莊。
    2.即事：當前的情物。以當前的事物為題材的詩，就是「即事詩」。
    3.曙：○粵[儲]，[cyu5]；○漢[shǔ]。
    4.正堪：正好。
    5.縱
A023:
  name: 韋應物
  dynasty: 唐
  bio: |-
    韋應物（公元737？—792？），京兆長安（今陝西省西安市）人。唐代
    詩人。早年曾在宮中任唐玄宗的侍衛，生活頗為放浪。後來他讀書進仕，德
    宗時，曾任滁州、江州、蘇州等地刺史，世稱「韋蘇州」。他對陶淵明極為
    欣賞，不但作詩仿效他，在生活上也學習他，當時的人已把他和陶淵明並舉。
    他的詩多描摹自然風景，以山水田園詩見稱，主要抒寫恬靜閒適的襟懷。
A024:
  name: 孟郊
  dynasty: 唐
  bio: |-
    孟郊（公元751—814），字東野，湖州武康（今浙江省德清縣）人。唐
    代詩人。早年隱居於嵩山，閉門苦讀，但屢試不第，四十六歲才中進士；後
    來做過一些小官，終其一生並不得志。孟郊為人耿介孤直，不善交際，但與
    韓愈一見如故，結為終生摯友。他的詩作多五言古詩，擅長抒寫清寒、愁苦、
    悲淒之情，用字造句力避平庸淺易，形成了獨特的風格。
A025:
  name: 杜荀鶴
  dynasty: 唐
  bio: |-
    王建（公元766？—？），字仲初。唐代穎川（今河南省許昌市）人；
    大曆時進士，官位不高，曾從軍邊塞，晚年退居咸陽原（今在陝西省咸陽縣
    境內）。因一生貧困，他接近人民的機會比較多，故他的樂府詩，往往有深
    刻寓意，是元稹、白居易寫作「新樂府」的先導。
    二、注釋
    1.初：剛開始，最初。
    2.直生枝：伸出來的枝條。
    3.閑：通「閒」，表示有空。
    4.傍：一作「旁」。依傍，謂站立一旁。
    5.長：生長，○粵[
A026:
  name: 韓愈
  dynasty: 唐
  bio: |-
    韓愈（公元768—824），字退之，唐代河陽（今河南省孟州市）人。貞
    元八年進士。韓愈性情剛直敢言，元和十四年，唐憲宗欲迎佛骨入宮廷，群
    臣不敢反對，只有韓愈挺身而出，言辭激烈地上表力諫。其中說到信佛的皇
    帝不是得禍就是短命，憲宗閱後大怒，差點將他處死。他還具有一般文人少
    有的處理軍事的才能，曾輔佐宰相裴度平定淮西，晚年又奉命成功地撫平了
    鎮州叛軍，因而蘇軾稱讚他「勇奪三軍之帥」。
    韓愈大力倡導古
A027:
  name: 劉禹錫
  dynasty: 唐
  bio: |-
    劉禹錫（公元772—842），字夢得，唐代洛陽（今河南省洛陽市）人。
    貞元年間進士，因參加了王叔文的政治改革，失敗後被貶。他是中唐時著名
    詩人，與柳宗元、白居易齊名。他的詩通俗清新，學習民歌所創作的《竹枝
    詞》、《楊柳枝詞》等，新鮮活潑，非常接近口語，為唐詩中別開生面之作。
A028:
  name: 白居易
  dynasty: 唐
  bio: |-
    白居易（公元772—846），字樂天，晚年信佛，號香山居士。祖籍山西
    太原，後遷居下邽（今陝西省渭南市）。他自幼聰慧，刻苦讀書，貞元十六
    年（公元800）登進士第，曾任杭州、蘇州等地刺史，七十一歲時以刑部尚
    書的官銜引退，算得上是仕途順利。由於他出身於中下階層，是從困苦的環
    境中奮鬥出來，所以深知社會種種弊端，亦能體察民間疾苦。
    白居易很重視文學的諷諭功能，強調繼承《詩經》和樂府詩的優良傳統，
    以
A029:
  name: 李紳
  dynasty: 唐
  bio: |-
    李紳（公元772—846），字公垂，唐代潤州無錫（今江蘇省無錫市）人，
    在武宗時官至宰相。在政治上，他是一個有抱負、有眼光的人，可惜他的前
    半生懷才不遇，後半生又捲入朋黨鬥爭的漩渦，不能實現他的濟世理想。在
    文學上，他是「新樂府運動」中的重要人物，和元稹、白居易關係密切，早
    年曾作《新題樂府》二十首，可惜沒有流傳。
A030:
  name: 柳宗元
  dynasty: 唐
  bio: |-
    柳宗元（公元773—819），字子厚，唐代河東（今山西省）人。貞元年
    間進士，曾因參與王叔文所領導的政治改革，失敗後被貶，卒於柳州刺史任
    上，世稱「柳河東」或「柳柳州」。
    柳宗元是唐宋古文八大家之一，與韓愈同為古文運動的倡導者。他的詩
    大都描寫自然山水，詩風與陶淵明、謝靈運相近。
A031:
  name: 賈島
  dynasty: 唐
  bio: |-
    賈島（公元779—843），字閬仙，唐代范陽（今北京市附近）人。早年
    做過和尚，後來與韓愈等著名詩人結識，並同他們作詩唱和，詩名大振。他
    還俗後考中進士，曾任官長江（今四川省篷溪縣），世稱「賈長江」。
    賈島是中唐著名「苦吟詩人」，作詩極重字句推敲、錘煉，追求奇巧，
    甚至近於奇險怪僻。傳說有一次賈島一邊騎驢一邊做詩，得到「鳥宿池邊樹，
    僧敲月下門」兩句。第二句的「敲」字又想改用「推」字，猶豫不決，就
A032:
  name: 朱慶餘
  dynasty: 唐
A033:
  name: 杜秋娘
  dynasty: 唐
  bio: |-
    杜秋娘（生卒年不詳），唐代金陵（今江蘇省南京市）人。十五歲時嫁
    唐宗室李錡為妾，後李錡以叛亂罪被殺，杜秋娘被送入宮中，為唐憲宗所寵。
    穆宗時，為皇子褓姆，不久皇子被廢，賜歸金陵，此時杜秋娘既窮且老，景
    況淒涼。後來詩人杜牧路過金陵，聽到杜秋娘的故事，有感而發，寫了一首
    《杜秋娘詩》並序，述說她的生平。
    二、注釋
    1.《金縷衣》：樂府曲辭。
    2.莫惜：不要愛惜。
    3.金縷衣：用金線編織而成的華貴衣服
A034:
  name: 杜牧
  dynasty: 唐
  bio: |
    杜牧（公元803—852），字牧之，京兆萬年（今陝西省西安市）人。他
    的祖先聲名顯赫，祖父杜佑在唐代是三朝宰相。他是太和二年（公元828）
    進士；由於他賦性剛直，不善逢迎，所以仕途並不得意。杜牧工詩、賦及古
    文，以詩的成就為最高，後人稱他為「小杜」，以別於杜甫。他特別擅長七
    言律詩和絕句，寫景抒情，詠史懷古，意味深遠。
    二背景資料
    太和七年（公元833），杜牧應淮南節度使牛僧孺的聘請，來到揚州，
A035:
  name: 李商隱
  dynasty: 唐
  bio: |-
    李商隱（公元813—858），字義山，號玉谿生，懷州河內（今河南省泌
    陽縣）人。開成二年進士。當時牛、李黨爭劇烈，他被捲入漩渦，在政治上
    受到排擠，一生困頓失意。李商隱和杜牧齊名，是晚唐重要詩人之一。他的
    詩多寫時代亂離的感慨，個人失意的心情。其中有不少借古詠今的詠史詩和
    纏綿悱惻的愛情詩。由於時代混亂、遭遇坎坷，詩中往往流露出濃厚的消極
    感傷情緒。他在詩歌藝術上善於廣泛地從多方面學習前人，又能形
A036:
  name: 曹鄴
  dynasty: 唐
  bio: |-
    曹鄴（公元816？—875？），字業之，一作鄴之，唐代桂州（今廣西省
    桂林市）人。大中四年（公元850）進士，是唐末詩人中仕宦較為顯達的一
    位。他為人正直耿介，詩作常針砭時弊，反映民間疾苦，諷刺貪官污吏，能
    言人之所不敢言。他的詩語言通俗，近於民謠，和同輩詩人輕浮綺艷的風格
    不大相同。
A037:
  name: 寇準
  dynasty: 宋
  bio: |-
    寇準（公元961—1023），字平仲，華州下邽（今陝西省渭南縣東北）
    人，北宋著名的政治家。進士出身，兩次擔任宰相。景德元年(1004)遼兵犯
    境，他力勸真宗御駕親征，最終訂立「澶淵之盟」。但他因性格剛毅，受到
    排擠，終遭貶謫，死於雷州（今廣東海康）任上。他的詩以絕句著稱，風格
    淡雅。
    二、注釋
    1.華山：在陝西省華陰縣南，為五嶽中的西嶽，海拔1997公尺，山峰雄奇
    險峻，有蓮花峰、朝陽峰、玉女峰
A038:
  name: 歐陽修
  dynasty: 宋
  bio: |-
    歐陽修（公元1007—1072），字永叔，號醉翁，又號六一居士，北宋吉
    州廬陵（今江西省吉安市）人。幼年喪父，家境貧寒，母親用蘆杆教他認字。
    仁宗天聖年間進士，曾任參知政事等職。由於支持范仲淹推行政治革新，與
    朝廷中的保守勢力形成對立，也因此而遭忌恨彈劾，曾屢次被貶。但在文壇
    上，他是當時公認的領袖，對宋代文學的發展起了重要作用，是「唐宋八大
    家」之一。他在散文、詩、詞各方面都成就卓著。
A039:
  name: 蘇舜欽
  dynasty: 宋
  bio: |-
    蘇舜欽（公元1008—1048），字子美，原籍梓州銅山（今四川省中江
    縣），自曾祖移居開封（今河南省開封市）。北宋仁宗景祐元年進士，因受
    政治鬥爭牽連，廢為平民，寓居蘇州，寄情山水。他的詩多關注時事政局，
    針砭社會弊端，感情激昂，氣勢宏大。但他的一些寫景抒情詩歌，則別具意
    境，清新秀朗。
    二、注釋
    1.淮中：泛指淮河流域。
    2.犢頭：淮河沿岸地名。
    犢：○粵[讀]，[duk6]；○漢[dú]。
    3
A040:
  name: 王安石
  dynasty: 宋
  bio: |-
    王安石（公元1021—1086），字介甫，北宋撫州臨川（今江西省撫州市）
    人。他是著名政治家，宋神宗熙寧年間兩任宰相，推行新法，改革政治。晚
    年退居江寧（今江蘇省南京市）半山園。在文學方面，他也很有成就，是唐
    宋古文八大家之一。他的散文立意高遠，中心明確，議論透闢。他前期的詩
    歌多指陳現實，有感而發，語言激烈尖銳；晚年轉寫山水風光，更注重字句
    的推敲錘煉，又喜歡用冷僻的典故。這些風格，一方面繼承了
A041:
  name: 蘇軾
  dynasty: 宋
  bio: |-
    蘇軾（公元1037—1101），字子瞻，號東坡居士，眉州眉山（今四川省
    眉山市）人，宋仁宗嘉祐二年（公元1057）進士。他雖與王安石同出歐陽
    修門下，但政見不同，反對王安石的新黨所推行的變法，在政治上屬於舊黨。
    在新黨執政時，他屢遭貶謫，先後外放到不同的地方任官，結果卒於常州。
    蘇軾和父親蘇洵、弟弟蘇轍，都是有名的散文家，世稱「三蘇」，同在
    唐宋八大家之列。蘇軾在詩、詞、賦、書法等各方面都有傑出的
A042:
  name: 李綱
  dynasty: 宋
  bio: |-
    李綱（公元1083—1140），邵武（今屬福建省邵武市）人。宋徽宗政和
    二年進士。靖康元年（公元1126），他鎮守東京汴梁（今河南省開封市），
    擊退了金兵的入侵。南宋初期曾任宰相，規劃革新內政，以增強抗金的力量；
    後來遭到朝廷中主和派的排擠，被迫罷相流放。他一生憂國憂民，以天下安
    危為己任，留下了一些富有愛國思想的作品。
A043:
  name: 楊萬里
  dynasty: 宋
  bio: |-
    楊萬里（公元1127—1206），字廷秀，號誠齋，南宋吉州吉水（今屬江
    西省）人。紹興二十四年（公元1154）進士，官至秘書監。他的性格剛直，
    不畏權貴，常受權奸排擠；晚年誓不出仕。他曾作詩二萬餘首，今存四千多
    首，是中國文學史上寫詩最多的作家。他善於攝取自然景物的特徵，作品寫
    得新奇風趣，自然活潑，生動巧妙，終自成一家，時稱「誠齋體」。
A044:
  name: 朱熹
  dynasty: 宋
  bio: |-
    朱熹（公元1130—1200），字元晦，號晦庵，別稱紫陽，徽州婺源（今
    屬江西省）人，南宋理學家。他的思想，以「天理」為哲學的最高範疇，倡
    導「去人欲，存天理」。基於這一道德哲學，他對古代文化典籍重新作了系
    統的整理和解釋，他所編撰的《四書章句集注》、《詩集傳》等，是宋代開
    始中國讀書人應考必讀之書，影響中國七百餘年。他的思想對日本、朝鮮等
    國亦有深遠影響。他是很有文學修養的學者，詩和散文都有相當
A045:
  name: 南宋民歌
  dynasty: 宋
A046:
  name: 林升
  dynasty: 宋
  bio: |-
    林升，生卒年不詳，約生活於南宋孝宗淳熙（公元1174—1189）年間，
    字夢屏，溫州平陽（今屬浙江省）人。
A047:
  name: 趙師秀
  dynasty: 宋
  bio: |-
    趙師秀（公元1170？—1219），字紫芝，又字靈秀，宋太祖八世孫，南
    渡後定居在永嘉（今浙江省溫州市），中過進士，也做過一些小官。他的詩
    效法唐代詩人賈島、姚合，作品多描寫山水風光，注重詞語錘煉。
    二、注釋
    1.黃梅時節：春末夏初梅子黃熟時，是江南多雨時節。
    2.燈花：蠟燭燃燒過久，在燈芯旁凝結而成的像花一樣的蠟燭油。
    三、賞析重點
    詩題為「約客」，實際上是寫久候客人未至的情景。這正是江南的黃梅
A048:
  name: 葉紹翁
  dynasty: 宋
  bio: |-
    葉紹翁（生卒年不詳），約生活於南宋寧宗、理宗時期，字嗣宗，號靖
    逸，祖籍建安薄城（今屬福建省），長期隱居於杭州西湖之濱。長於絕句，
    特別擅於寫景。
    二、注釋
    1.不值：不遇，沒有見到要探訪的人。
    2.憐：愛惜。
    3.屐齒：木鞋鞋底的一釘齒，便於泥地行走。
    屐：○粵[劇]，[kek6]；○漢[jī]。
    4.蒼苔：青苔。
    5.小扣：輕輕敲擊。
    6.柴扉：柴門。
    扉：○粵[非]，[fei1]；○漢[fē
A049:
  name: 文天祥
  dynasty: 宋
  bio: |-
    文天祥（1236—1283），字履善，一字宋瑞，號文山，吉水（今安西省
    吉安縣）人。南宋名臣，中國歷史上著名的民族英雄。他二十歲中狀元，官
    至丞相。在元兵大舉渡江，南宋局勢岌岌可危的緊急關頭，他在贛州組織義
    軍，率兵奔赴臨安（南宋都城）保衞皇室。不久奉命前往元軍兵營談判，被
    扣留，後冒險逃到溫州，擁立益王趙昰，以圖復國。他募集將士，抵禦元兵，
    轉戰贛（今江西省）、閩（今福建省）、嶺南（今廣東省），
A050:
  name: 王冕
  dynasty: 元
A051:
  name: 于謙
  dynasty: 明
  bio: |-
    于謙（公元1398—1457），字廷益，錢塘（今浙江省杭州市）人。明成
    祖永樂十九年（公元1421）進士，為官清正，不畏強權。正統十四年（公
    元1449），蒙古瓦剌部族入侵，在土木堡大敗明軍，俘去英宗，進逼北京。
    于謙出任兵部尚書，擁立景帝，反對南遷，並率軍打敗了瓦剌軍，使政局轉
    危為安。景泰八年（公元1457），英宗回朝後，他被誣陷犯下「謀逆罪」而
    遭殺害，卒年五十九歲；後在萬曆年間得到平反，諡
A052:
  name: 唐寅
  dynasty: 明
  bio: |-
    唐寅（公元1470—1523），字伯虎，吳縣（今屬江蘇省）人。明代畫家、
    文學家。他年少而有才名，為人風流倜儻；廿九歲時中鄉試第一，故人稱「解
    元」，後因牽涉科場舞弊案，徹底失去做官的機會。唐寅此後以賣畫為生，
    山水、人物、花鳥他都擅長，工筆、寫意俱佳，兼善書法，亦能詩文。
    二、注釋
    1.寅：○粵[仁]，[jan4]；○漢[yín]。
    2.裁：剪裁，縫製。
    3.走將來：走過來。將：語助詞，表示動作
A053:
  name: 徐渭
  dynasty: 明
  bio: |-
    徐渭（公元1521—1593），字文長，號青藤山人。山陰（今浙江省紹
    興市）人。明代著名的藝術家。早年參加鄉試，屢試不第；中年做過浙閔總
    督胡宗憲的幕客，曾為對抗倭寇的軍事出謀畫策。但由於徐渭嫉惡如仇，鄙
    視權貴，導致他一生窮困潦倒，甚至一度發狂，晚年只能靠變賣書畫度日。
    他在書法、繪畫、詩文、戲曲等多方面都有很高的造詣。他的畫自成一家，
    尤其擅長花鳥，據史料載，近代花鳥畫中流行的潤筆寫意的潑墨畫
A054:
  name: 鄭燮
  dynasty: 清
  bio: |-
    鄭燮(公元1693—1765)，號板橋，江蘇興化(今江蘇省揚州市)人，祖籍
    蘇州。清代著名的書畫家、文學家。乾隆年間進士，曾任知縣，政績清明，
    頗得百姓愛戴；後因得罪豪商贓官，被誣貪污，最終黜官回鄉。他在當時已
    是很有名的藝術家。他的書法以隸、楷、行三體相參，自稱為「六分半書」。
    他的畫以蘭、竹、石見長，隨意揮灑，筆趣橫生。他的詩真率自然，多反映
    人民苦，抒寫落拓不羈的情懷；有《板橋全集》傳世。
A055:
  name: 高鼎
  dynasty: 清
  bio: |-
    高鼎（生卒年不詳），清代詩人，大約生活在咸豐（公元1851—1861）
    年間。字象一，又字拙吾，浙江仁和（今浙江省杭州市）人。他的詩歌擅長
    描繪自然景物。
    二、注釋
    1.草長鶯飛：小草生長，鶯鳥飛舞。
    2.二月天：早春二月的天氣。
    3.拂：拂拭，輕輕擦過。
    4.醉：陶醉。
    5.春煙：春天的霧氣。
    6.散學：放學。
